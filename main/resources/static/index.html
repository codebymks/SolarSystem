<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="text">
    <h1>✨ Solar System Explorer ✨</h1>
</div>

<!--Solar system animation-->
<div id="main">
    <div id="solarsystem">
        <div id="speedControl">
            <label>Speed: <input type="range" id="speed" min="0.1" max="5" step="0.5" value="1"></label>
        </div>
        <canvas id="canvas"></canvas>
    </div>

    <!--Chat panel-->
    <div id="chatPanel">
        <h2>🪐ChatSpace🪐</h2>
        <!--Messages from chat-->
        <div id="messages"></div>

        <!--Input form-->
        <form id="chatForm">
            <input id="userInput" type="text" placeholder="Ask about the solar system..." autocomplete="off">
            <button type="submit">Ask</button>
        </form>
        <div id="spinner" style="display:none">Loading...</div>
    </div>
</div>
<script src="js/solarSystem.js"></script>
</body>
</html>
